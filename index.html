<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abhishek Manake — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b12;
      --bg2: #0d1220;
      --bg3: #111827;
      --surface: rgba(255,255,255,0.04);
      --surface2: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --accent3: #f59e0b;
      --text: #f0f4ff;
      --muted: #8892a4;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }

    /* Progress bar */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 9999;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.1s ease;
      box-shadow: 0 0 12px var(--accent);
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* Ambient orbs */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
    }
    .orb-1 { width: 600px; height: 600px; background: rgba(0,212,255,0.08); top: -200px; right: -200px; }
    .orb-2 { width: 500px; height: 500px; background: rgba(124,58,237,0.08); bottom: 100px; left: -200px; }
    .orb-3 { width: 400px; height: 400px; background: rgba(245,158,11,0.05); top: 50%; left: 50%; transform: translate(-50%,-50%); }

    /* Navbar */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 0 2rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      transition: all 0.3s ease;
      font-family: var(--font-display);
    }
    nav.scrolled {
      background: rgba(8,11,18,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.875rem;
      font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--accent);
      transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-cta {
      padding: 0.5rem 1.25rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff !important; border-radius: 100px;
      font-size: 0.8rem !important; font-weight: 600 !important;
      text-transform: uppercase !important; letter-spacing: 1px !important;
      transition: opacity 0.2s, transform 0.2s !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { opacity: 0.85; transform: translateY(-1px); }

    /* Hamburger */
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    .mobile-menu {
      display: none; position: fixed; top: 64px; left: 0; right: 0; z-index: 999;
      background: rgba(8,11,18,0.97); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem;
      flex-direction: column; gap: 1rem;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      color: var(--muted); text-decoration: none; font-family: var(--font-display);
      font-size: 1rem; font-weight: 600; padding: 0.75rem 0;
      border-bottom: 1px solid var(--border); transition: color 0.2s;
    }
    .mobile-menu a:hover { color: var(--accent); }

    /* Sections */
    section { position: relative; z-index: 1; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    /* Hero */
    #hero {
      min-height: 100vh; display: flex; align-items: center;
      padding-top: 64px;
    }
    .hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 1rem; border-radius: 100px;
      border: 1px solid rgba(0,212,255,0.3);
      background: rgba(0,212,255,0.06);
      font-size: 0.8rem; color: var(--accent); font-weight: 500;
      margin-bottom: 1.5rem;
      animation: fadeInDown 0.6s ease forwards;
    }
    .hero-badge span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }

    .hero-name {
      font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800; line-height: 1.05; letter-spacing: -2px;
      margin-bottom: 1rem;
      animation: fadeInUp 0.7s 0.1s ease both;
    }
    .hero-name .line1 { display: block; color: var(--text); }
    .hero-name .line2 {
      display: block;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .hero-typing {
      font-size: 1.25rem; color: var(--muted); margin-bottom: 1.5rem; min-height: 2rem;
      animation: fadeInUp 0.7s 0.2s ease both;
    }
    .cursor { display: inline-block; width: 2px; height: 1.2em; background: var(--accent); margin-left: 2px; animation: blink 0.8s infinite; vertical-align: middle; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .hero-desc { color: var(--muted); line-height: 1.8; margin-bottom: 2rem; animation: fadeInUp 0.7s 0.3s ease both; }

    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; animation: fadeInUp 0.7s 0.4s ease both; }
    .btn {
      padding: 0.85rem 2rem; border-radius: 100px; font-family: var(--font-display);
      font-size: 0.875rem; font-weight: 700; letter-spacing: 0.5px;
      cursor: pointer; transition: all 0.25s; border: none; text-decoration: none;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; box-shadow: 0 8px 32px rgba(0,212,255,0.25);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 48px rgba(0,212,255,0.35); }
    .btn-ghost {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }

    .hero-visual { display: flex; justify-content: center; align-items: center; animation: fadeIn 1s 0.5s ease both; }
    .avatar-wrap {
      position: relative; width: 300px; height: 300px;
    }
    .avatar-ring {
      position: absolute; inset: -8px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent3), var(--accent));
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-ring-inner {
      position: absolute; inset: 3px;
      border-radius: 50%; background: var(--bg);
    }
    .avatar-content {
      position: absolute; inset: 12px; border-radius: 50%;
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 5rem; font-weight: 800;
      color: var(--accent);
      overflow: hidden;
    }
    .avatar-initial {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .float-badge {
      position: absolute; background: rgba(13,18,32,0.9);
      backdrop-filter: blur(12px); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.5rem 0.8rem;
      font-size: 0.75rem; font-weight: 600; font-family: var(--font-display);
      display: flex; align-items: center; gap: 0.4rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .float-badge-1 { bottom: 20px; right: -30px; color: var(--accent); animation-delay: 0s; }
    .float-badge-2 { top: 20px; left: -30px; color: var(--accent3); animation-delay: 1.5s; }
    .float-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      color: var(--muted); font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
      animation: fadeIn 1.5s 1s ease both;
    }
    .scroll-line { width: 1px; height: 50px; background: linear-gradient(to bottom, var(--accent), transparent); animation: grow 1.5s ease-in-out infinite; }
    @keyframes grow { 0%,100%{height:20px;opacity:0.3} 50%{height:50px;opacity:1} }

    /* Section headings */
    .section-label {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 0.75rem; font-family: var(--font-display);
    }
    .section-label::before { content: ''; display: block; width: 24px; height: 2px; background: var(--accent); }
    .section-title {
      font-family: var(--font-display); font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 800; letter-spacing: -1px; margin-bottom: 1rem;
    }
    .section-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* Reveal animation */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* About */
    #about { padding: 8rem 0; }
    .about-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; align-items: start; }
    .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.5rem; text-align: center;
      transition: border-color 0.3s, background 0.3s;
    }
    .stat-card:hover { border-color: rgba(0,212,255,0.3); background: var(--surface2); }
    .stat-num { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }
    .about-text { color: var(--muted); line-height: 1.9; }
    .about-text p { margin-bottom: 1rem; }
    .highlight { color: var(--text); font-weight: 500; }
    .info-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
    .info-item { display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; color: var(--muted); }
    .info-item svg { color: var(--accent); flex-shrink: 0; }

    /* Skills */
    #skills { padding: 8rem 0; }
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 3rem; }
    .skill-category {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 1.75rem; transition: all 0.3s;
    }
    .skill-category:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-4px); background: var(--surface2); }
    .skill-cat-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
    .skill-cat-icon { font-size: 1.25rem; }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .skill-tag {
      padding: 0.35rem 0.85rem; border-radius: 100px; font-size: 0.8rem; font-weight: 500;
      border: 1px solid; cursor: default; transition: all 0.2s;
    }
    .skill-tag:hover { transform: scale(1.05); }
    .tag-cyan { color: var(--accent); border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.06); }
    .tag-purple { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.06); }
    .tag-amber { color: var(--accent3); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); }
    .tag-green { color: #34d399; border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.06); }
    .tag-pink { color: #f472b6; border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.06); }

    /* Projects */
    #projects { padding: 8rem 0; }
    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 2rem 0; }
    .filter-btn {
      padding: 0.5rem 1.25rem; border-radius: 100px; font-size: 0.8rem; font-weight: 600;
      font-family: var(--font-display); letter-spacing: 0.5px; cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--muted); transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border-color: transparent;
    }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .project-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      overflow: hidden; transition: all 0.35s; cursor: pointer;
    }
    .project-card:hover { transform: translateY(-8px); border-color: rgba(0,212,255,0.25); box-shadow: 0 24px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,212,255,0.1); }
    .project-img {
      height: 180px; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .project-img-bg {
      position: absolute; inset: 0;
      transition: transform 0.5s ease;
    }
    .project-card:hover .project-img-bg { transform: scale(1.05); }
    .project-img-icon {
      position: relative; z-index: 1; font-size: 3rem;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.5));
    }
    .project-body { padding: 1.5rem; }
    .project-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    .project-type {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); font-family: var(--font-display);
    }
    .project-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .project-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.25rem; }
    .project-stack { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem; }
    .stack-badge {
      padding: 0.2rem 0.65rem; border-radius: 6px; font-size: 0.72rem; font-weight: 600;
      background: rgba(255,255,255,0.07); color: var(--muted); border: 1px solid var(--border);
    }
    .project-links { display: flex; gap: 0.75rem; }
    .project-link {
      flex: 1; padding: 0.6rem; border-radius: 10px; text-align: center;
      text-decoration: none; font-size: 0.8rem; font-weight: 600; font-family: var(--font-display);
      transition: all 0.2s; border: 1px solid;
    }
    .link-github { border-color: var(--border); color: var(--muted); background: var(--surface); }
    .link-github:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
    .link-live { border-color: rgba(0,212,255,0.3); color: var(--accent); background: rgba(0,212,255,0.07); }
    .link-live:hover { background: rgba(0,212,255,0.15); }

    /* Education */
    #education { padding: 8rem 0; }
    .timeline { position: relative; margin-top: 3rem; }
    .timeline::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--accent), var(--accent2), transparent); }
    .timeline-item { padding-left: 2.5rem; margin-bottom: 2.5rem; position: relative; }
    .timeline-dot {
      position: absolute; left: -6px; top: 0.75rem;
      width: 14px; height: 14px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 16px rgba(0,212,255,0.5);
    }
    .timeline-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.5rem; transition: all 0.3s;
    }
    .timeline-card:hover { border-color: rgba(0,212,255,0.2); background: var(--surface2); transform: translateX(4px); }
    .timeline-year { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem; font-family: var(--font-display); }
    .timeline-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .timeline-institution { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.5rem; }
    .timeline-badge {
      display: inline-block; padding: 0.2rem 0.7rem; border-radius: 100px; font-size: 0.75rem; font-weight: 600;
      background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.2);
    }

    .cert-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.5rem; margin-top: 1rem; display: flex; align-items: center; gap: 1rem;
      transition: all 0.3s;
    }
    .cert-card:hover { border-color: rgba(245,158,11,0.3); background: var(--surface2); transform: translateY(-2px); }
    .cert-icon { font-size: 2rem; flex-shrink: 0; }
    .cert-title { font-family: var(--font-display); font-weight: 700; margin-bottom: 0.25rem; }
    .cert-org { font-size: 0.85rem; color: var(--accent3); }

    /* Contact */
    #contact { padding: 8rem 0; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; align-items: start; margin-top: 3rem; }
    .contact-info { display: flex; flex-direction: column; gap: 1rem; }
    .contact-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 1rem;
      transition: all 0.3s;
    }
    .contact-card:hover { border-color: rgba(0,212,255,0.2); background: var(--surface2); transform: translateX(4px); }
    .contact-card-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; }
    .contact-card-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.1rem; text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-display); }
    .contact-card-value { font-size: 0.9rem; font-weight: 500; }
    .contact-form { display: flex; flex-direction: column; gap: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-field { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-field label { font-size: 0.8rem; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; font-family: var(--font-display); }
    .form-input, .form-textarea {

      useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
        }, { threshold: 0.1 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

    function useTyping(words) {
      const [text, setText] = useState('');
      const [wIdx, setWIdx] = useState(0);
      const [cIdx, setCIdx] = useState(0);
      const [deleting, setDeleting] = useState(false);
      useEffect(() => {
        const current = words[wIdx];
        const timeout = setTimeout(() => {
          if (!deleting) {
            if (cIdx < current.length) { setText(current.slice(0, cIdx + 1)); setCIdx(c => c + 1); }
            else { setTimeout(() => setDeleting(true), 1500); }
          } else {
            if (cIdx > 0) { setText(current.slice(0, cIdx - 1)); setCIdx(c => c - 1); }
            else { setDeleting(false); setWIdx(i => (i + 1) % words.length); }
          }
        }, deleting ? 60 : 110);
        return () => clearTimeout(timeout);
      }, [text, deleting, wIdx, cIdx, words]);
      return text;
    }

          bar.style.width = (scrolled / total * 100) + '%';
        };
        window.addEventListener('scroll', update);
        return () => window.removeEventListener('scroll', update);
      }, []);
      return null;
    }

                    <div className="form-field">
                      <label>Name</label>
                      <input className={`form-input${errors.name?' error':''}`} value={form.name} onChange={e=>change('name',e.target.value)} placeholder="Your name"/>
                      {errors.name && <span className="form-error">{errors.name}</span>}
                    </div>
                    <div className="form-field">
                      <label>Email</label>
                      <input className={`form-input${errors.email?' error':''}`} value={form.email} onChange={e=>change('email',e.target.value)} placeholder="your@email.com" type="email"/>
                      {errors.email && <span className="form-error">{errors.email}</span>}
                    </div>
                  </div>
                  <div className="form-field">
                    <label>Subject</label>
                    <input className="form-input" value={form.subject} onChange={e=>change('subject',e.target.value)} placeholder="What's this about?"/>
                  </div>
                  <div className="form-field">
                    <label>Message</label>
                    <textarea className={`form-textarea${errors.message?' error':''}`} value={form.message} onChange={e=>change('message',e.target.value)} placeholder="Your message..."/>
                    {errors.message && <span className="form-error">{errors.message}</span>}
                  </div>
                  {status==='success' && <div className="form-status success">✓ Message sent! I'll get back to you soon.</div>}
                  <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center'}}>
                    Send Message →
                  </button>
                </form>
              </div>
            </div>
          </div>
        </section>
      );
    }
